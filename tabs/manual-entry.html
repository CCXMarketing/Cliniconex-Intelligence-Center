<div class="dept-header" style="background: linear-gradient(135deg, #02475A 0%, #0a6e8a 100%);">
  <div class="dept-header__left">
    <h2>KPI Manual Entry</h2>
    <p>Enter monthly values for KPIs without automated data sources</p>
  </div>
  <div class="dept-header__right">
    <span class="badge badge--grey">Manual Input</span>
    <span class="badge badge--grey">Monthly</span>
  </div>
</div>

<div class="manual-entry-banner" style="background:#E0F5F8;border:1px solid #029FB5;border-radius:8px;
  padding:14px 18px;margin-bottom:24px;font-size:13px;
  color:#02475A;font-weight:600;font-family:'Nunito Sans',sans-serif;">
  Loading...
</div>

<!-- Department Forms (populated by manual-entry.js from catalog) -->
<div id="manual-entry-forms">
  <div class="tab-loading">Loading KPI catalog...</div>
</div>

<!-- Saved Data Summary -->
<div class="section-header" style="margin-top:32px;">
  <h3>All Saved Entries</h3>
  <p>Manual KPI values for the current period</p>
</div>
<div class="table-wrapper">
  <table class="data-table" id="manual-summary-table">
    <thead>
      <tr>
        <th>Department</th>
        <th>KPI</th>
        <th class="col-right">Value</th>
        <th>Updated By</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="manual-summary-tbody">
      <!-- Populated by manual-entry.js -->
    </tbody>
  </table>
</div>
