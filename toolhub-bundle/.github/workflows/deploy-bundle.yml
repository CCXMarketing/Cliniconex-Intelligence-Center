name: Build MIC Bundle

on:
  push:
    branches: [main]
    paths:
      - 'toolhub-bundle/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: toolhub-bundle/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: toolhub-bundle

      - name: Build bundle
        run: pnpm build
        working-directory: toolhub-bundle
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SERVICE_TOKEN: ${{ secrets.VITE_SERVICE_TOKEN }}

      - name: Create ZIP
        run: cd dist && zip -r ../mic-tool.zip .
        working-directory: toolhub-bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mic-tool-${{ github.sha }}
          path: toolhub-bundle/mic-tool.zip
          retention-days: 30
