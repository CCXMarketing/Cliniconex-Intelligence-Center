name: Deploy to radar

# Triggers:
#   push to main           — auto-deploy on every merge
#   workflow_dispatch      — manual trigger for testing or re-running
on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent two deploys from racing each other on the same target.
concurrency:
  group: deploy-radar
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-mock

      - name: Run tests
        run: pytest -q

      # Joins the GHA runner to the Cliniconex tailnet as an ephemeral node.
      # Tags it `tag:ci` — the Tailscale ACL must allow tag:ci to SSH to radar
      # as root. No SSH keypair needed: Tailscale SSH (already enabled on
      # radar) handles authentication via tailnet identity.
      - name: Set up Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      # The GHA runner's resolver doesn't pick up Tailscale's MagicDNS,
      # AND `tailscale ip -4 <name>` itself routes through the system
      # resolver too. Query tailscaled directly via `tailscale status
      # --json` and pull radar's IP straight from the peer list. Then
      # pin it into ~/.ssh/config so the rest of the workflow can keep
      # using `radar` as a friendly alias.
      #
      # Tailscale SSH on radar accepts `none` auth from tagged peers, so
      # no SSH keypair is needed on either side.
      - name: Configure SSH client
        run: |
          RADAR_IP=$(tailscale status --json \
            | jq -r '.Peer[] | select(.HostName == "radar") | .TailscaleIPs[0] // empty')
          if [ -z "$RADAR_IP" ]; then
            echo "radar not visible in tailnet — check ACL allows tag:ci to see it" >&2
            tailscale status >&2 || true
            exit 1
          fi
          echo "Resolved radar -> $RADAR_IP"
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host radar
            HostName $RADAR_IP
            User root
            StrictHostKeyChecking accept-new
            UserKnownHostsFile /tmp/ssh_known_hosts
            ServerAliveInterval 30
          EOF

      # Excludes preserve runtime state on radar that mustn't be touched:
      #   .env / .env.bak    — secrets
      #   data/              — runtime SQLite snapshot store
      #   venv* / .venv      — Python virtualenv on radar (named 'venv',
      #                        no leading dot — without this exclude
      #                        --delete-after wipes it and breaks deploy)
      #   WIP.md             — session scratchpad
      #   .git / .github     — repo metadata not needed at runtime
      #   __pycache__ / *.pyc — local Python build artifacts
      - name: Rsync code to radar
        run: |
          rsync -az --delete-after \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='venv' --exclude='venv312' --exclude='.venv' \
            --exclude='.env' --exclude='.env.bak' \
            --exclude='WIP.md' --exclude='data' \
            --exclude='.git' --exclude='.github' --exclude='.claude' \
            ./ root@radar:/opt/cic/

      - name: Install deps + restart cic.service on radar
        run: |
          ssh root@radar bash -s <<'EOF'
          set -euo pipefail
          /opt/cic/venv/bin/pip install -q -r /opt/cic/requirements.txt
          systemctl restart cic.service
          # systemctl restart returns immediately; give workers a moment to boot.
          sleep 3
          systemctl is-active --quiet cic.service
          EOF

      # Confirms gunicorn is actually serving — a green workflow with a
      # broken deploy would be a worse failure mode than the current manual
      # process.
      - name: Smoke test /api/health
        run: |
          for attempt in 1 2 3; do
            if curl --fail-with-body --silent --max-time 30 \
                https://radar.merino-mooneye.ts.net/okr/api/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            echo "health check attempt $attempt failed; retrying..."
            sleep 5
          done
          echo "health check failed after 3 attempts"
          exit 1
