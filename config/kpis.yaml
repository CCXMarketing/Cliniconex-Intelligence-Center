  system: JIRA
  kpis_served: AI products launched, AI skills pilots, feature velocity
  status: Partial
  gaps: 'Need: pilot tracking mechanism; AI product/feature tagging; link to revenue outcomes'
- data_source: Finance / Accounting
  system: TBD
  kpis_served: EBITDA, CAC, LTV, support cost per customer, RPE, campaign ROI, marketing spend
  status: Partial
  gaps: Financial data not yet integrated into dashboard stack. Manual export or API needed.
