- data_source: Salesforce — Billing/Revenue
  system: Salesforce
  kpis_served: Recognized revenue, MRR, quota attainment, churn, NRR, health scores, segment revenue
  status: Available
  gaps: 'Need: product-level revenue tagging for AI attribution; segment field for SL/US Medical/Hospital;
    referral source field on Opportunity'
- data_source: Salesforce — Pipeline/Opps
  system: Salesforce
  kpis_served: Pipeline $, win rate, deal size, sales cycle, opportunities created, coverage ratio
  status: Available
  gaps: 'Need: channel type field (Reseller/Marketplace/ISV/SI/Direct); adjacent vertical tagging; consistent
    stage definitions'
- data_source: Salesforce — Cases
  system: Salesforce
  kpis_served: External ticket volume, resolution time, escalation rate
  status: Available
  gaps: 'Need: first-contact resolution field; escalation workflow tracking; post-ticket survey integration'
- data_source: Salesforce — Usage/Adoption
  system: Salesforce
  kpis_served: Product adoption rate, feature utilization, product-qualified leads
  status: Partial
  gaps: Usage analytics pipeline from ACP to SF needs to be built. Critical for 50% adoption KPI and AI
    product tracking.
- data_source: ActiveCampaign — Leads
  system: ActiveCampaign
  kpis_served: Marketing-sourced leads, MQLs, campaign attribution, lead source
  status: Available
  gaps: 'Need: new segment campaign tags (SL, US Medical, Hospital); referral source tracking; consistent
    lead stage definitions synced to SF'
- data_source: ActiveCampaign — Pipeline
  system: ActiveCampaign
  kpis_served: Direct sales pipeline, MOFU-to-BOFU conversion
  status: Available
  gaps: 'Need: alignment with SF opportunity stages for closed-loop attribution'
- data_source: JIRA — Internal
  system: JIRA
  kpis_served: Internal tickets, sprint delivery, say/do ratio, bug tracking, strategic vs. non-strategic
